<div class="login-inner-form">
  <div class="details">
    <img [src]="drone.appLogo" style="width: 130px; height: 130px" alt="Logo" />

    <h3 class="title-desc"></h3>

    <div class="clock-display">
      <p class="clock-time">{{ currentTime() }}</p>
      <p class="clock-date">{{ currentDate() }}</p>
    </div>

    <form autocomplete="off">
      <div class="form-group">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>លេខសម្គាល់</mat-label>
          <input matInput placeholder="លេខសម្គាល់" />
        </mat-form-field>
      </div>

      <div class="form-group">
        <mat-form-field appearance="outline">
          <mat-label>លេខសម្ងាត់</mat-label>
          <input
            name="password"
            matInput
            placeholder=""
            formControlName="password"
            [type]="passwordInputType()"
            required
            autocomplete="current-password"
          />
          <button mat-icon-button matSuffix type="button" (click)="toggleHide()">
            <mat-icon>{{ visibilityIcon() }}</mat-icon>
          </button>
        </mat-form-field>
      </div>

      <div class="form-group" style="margin-top: 20px">
        <button mat-button class="core-btn" [disabled]="loading()">
          @if (loading()) {
            <mat-spinner
              diameter="20"
              strokeWidth="3"
              style="display: inline-block; margin-right: 8px"
            ></mat-spinner>
          }
          {{ loading() ? 'កំពុងចូល...' : 'ចូលប្រើប្រាស់' }}
        </button>
      </div>

      <p class="ft-desc-copyright">©{{ currentYear() }} {{ drone.appReferacence }}</p>
      <p class="ft-desc-version">
        {{ drone.appVersion }}
      </p>
    </form>
  </div>
</div>
